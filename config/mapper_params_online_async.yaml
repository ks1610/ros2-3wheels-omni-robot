slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping 
    
    # Cấu hình tối ưu cho robot nhỏ
    map_update_interval: 2.0
    resolution: 0.05
    minimum_time_interval: 0.5
    transform_timeout: 0.2